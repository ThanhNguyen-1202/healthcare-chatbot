services:
  mongo:
    image: mongo:7
    container_name: healthcare-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    volumes:
      - ./data:/data:ro

  backend:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: healthcare-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - backend/.env.docker
    depends_on:
      - mongo


  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: healthcare-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo_data:
